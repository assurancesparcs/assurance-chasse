<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Espace privé — {{fullName}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #0d1b4b 0%, #162e1a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-wrap { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo h1 { font-family: Georgia, serif; font-size: 22px; color: #0d1b4b; font-weight: normal; }
.login-logo p { font-size: 12px; color: #6a7a5e; margin-top: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: #5a6a4e; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.field input { width: 100%; border: 1px solid #d0d8c0; border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #1a2e0a; outline: none; transition: border-color 0.2s; }
.field input:focus { border-color: #2d6a3f; }
.btn-login { width: 100%; background: #0d1b4b; color: #e0eaf8; font-size: 14px; font-weight: 600; padding: 14px; border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
.btn-login:hover:not(:disabled) { background: #162770; }
.btn-login:disabled { background: #8a9aae; cursor: not-allowed; }
.error { display: none; background: #ffeeee; border: 1px solid #c08080; border-radius: 8px; padding: 12px 14px; margin-top: 16px; font-size: 13px; color: #7a1a1a; }
.error.show { display: block; }
.footer-note { font-size: 11px; color: #8a9a8a; text-align: center; margin-top: 28px; line-height: 1.5; }
.footer-note a { color: #2d6a3f; text-decoration: none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <h1>{{fullName}}</h1>
    <p>Espace privé</p>
  </div>
  <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btn-login">Se connecter</button>
    <div class="error" id="error"></div>
  </form>
  <p class="footer-note">
    Accès réservé. Toutes les connexions sont journalisées.<br>
    En cas de problème : <a href="mailto:{{emailGeneral}}">{{emailGeneral}}</a>
  </p>
</div>
<script>
async function doLogin() {
  var btn = document.getElementById('btn-login');
  var err = document.getElementById('error');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    var res = await fetch('/api/secure-login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });
    var data = await res.json().catch(function(){return{};});
    if (!res.ok) throw new Error(data.error || 'Erreur ' + res.status);
    window.location.href = '/espace-securise.html';
  } catch(e) {
    err.textContent = e.message || 'Erreur de connexion';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}
</script>
</body>
</html>
