<style>
.video-section { background: linear-gradient(180deg, #faf9f5 0%, #f0ebe0 100%); padding: 64px 32px 72px; text-align: center; position: relative; }
.video-section::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 3px; background: linear-gradient(90deg, #0d1b4b, #2d6a3f); border-radius: 2px; }
.video-section .section-label { font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8b5e0a; margin-bottom: 8px; }
.video-title { font-size: clamp(22px, 3.2vw, 30px); color: #1a2e0a; font-weight: normal; line-height: 1.35; max-width: 620px; margin: 8px auto 28px; }
.video-frame-wrap { position: relative; width: min(560px, 100%); margin: 0 auto 28px; border-radius: 18px; overflow: hidden; box-shadow: 0 16px 48px rgba(13,27,75,0.22), 0 4px 12px rgba(13,27,75,0.08); border: 1px solid rgba(232,223,208,0.8); background: #0E120E; line-height: 0; }
.video-frame { width: 100%; height: auto; display: block; }
.video-cta-text { font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 14px; color: #5a6a4e; line-height: 1.6; max-width: 520px; margin: 0 auto 18px; }
.video-cta-text strong { color: #2d6a3f; font-weight: 700; }
.video-cta-btn { display: inline-flex; align-items: center; gap: 8px; background: #0d1b4b; color: #e0eaf8; font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 14px; font-weight: 600; padding: 13px 28px; border-radius: 10px; text-decoration: none; transition: background 0.2s, transform 0.2s; box-shadow: 0 4px 12px rgba(13,27,75,0.15); }
.video-cta-btn:hover { background: #162770; transform: translateY(-1px); }
@media(max-width:520px){ .video-section { padding: 48px 20px 56px; } .video-frame-wrap { border-radius: 14px; } }
</style>
<div class="video-section">
  <p class="section-label">À découvrir en 30 secondes</p>
  <h2 class="video-title">Pourquoi protéger sa sécurité en partie de chasse</h2>
  <div class="video-frame-wrap">
    <video class="video-frame" controls preload="metadata" playsinline>
      <source src="/securite-chasse.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la lecture vidéo HTML5.
      <a href="/securite-chasse.mp4">Télécharger la vidéo</a>.
    </video>
  </div>
  <p class="video-cta-text">La <strong>RC chasse de votre fédération</strong> couvre les tiers, mais pas vous. La garantie <strong>Sécurité chasse</strong> indemnise vos blessures corporelles.</p>
  <a href="/options-chasse.html" class="video-cta-btn">Souscrire la sécurité chasse — {{tarifSecurite}} €/an
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-top:1px"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</div>
