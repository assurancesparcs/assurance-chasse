<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Présentation Sécurité chasse — {{name}} ({{code}}) | ADC&E</title>
<meta name="description" content="Présentation des garanties d'assurance chasse en {{name}} en vidéo. Cabinet ADC&E, partenaire {{fdcShort}}.">
<link rel="canonical" href="https://{{domain}}/presentation.html">
<style>
{{stylesCommon}}

.pres-wrap { background: linear-gradient(180deg, #faf9f5 0%, #f0ebe0 100%); padding: 60px 32px 70px; min-height: calc(100vh - 200px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pres-intro { max-width: 620px; margin: 0 auto 28px; text-align: center; }
.pres-tag { display: inline-block; font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #2d6a3f; background: #eaf3de; padding: 5px 14px; border-radius: 20px; margin-bottom: 14px; }
.pres-message { font-family: 'Helvetica Neue',Arial,sans-serif; font-size: clamp(16px, 2.2vw, 19px); color: #1a2e0a; line-height: 1.5; font-weight: 500; }
.pres-video-wrap { position: relative; width: min(720px, 100%); margin: 0 auto; border-radius: 18px; overflow: hidden; box-shadow: 0 20px 56px rgba(13,27,75,0.25), 0 6px 16px rgba(13,27,75,0.1); border: 1px solid rgba(232,223,208,0.8); background: #0E120E; line-height: 0; }
.pres-video { width: 100%; height: auto; display: block; }
.pres-unmute { position: absolute; top: 14px; right: 14px; display: inline-flex; align-items: center; gap: 8px; background: rgba(13,27,75,0.85); color: #e0eaf8; padding: 9px 14px; border-radius: 22px; font-family: 'Helvetica Neue',Arial,sans-serif; font-size: 13px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; backdrop-filter: blur(4px); transition: background 0.2s, transform 0.2s; line-height: 1; }
.pres-unmute:hover { background: #162770; transform: scale(1.04); }
.pres-unmute.hidden { display: none; }
</style>
</head>
<body>
{{nav}}

<div class="pres-wrap">
  <div class="pres-intro">
    <span class="pres-tag">Présentation</span>
    <p class="pres-message">Les différentes garanties vous seront proposées à la fin de cette vidéo.</p>
  </div>

  <div class="pres-video-wrap">
    <video class="pres-video" id="pres-video" autoplay muted playsinline preload="auto">
      <source src="/securite-chasse.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la lecture vidéo HTML5.
      <a href="/securite-chasse.mp4">Télécharger la vidéo</a>.
    </video>
    <button type="button" id="pres-unmute" class="pres-unmute" aria-label="Activer le son">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      Activer le son
    </button>
  </div>

</div>

<script>
(function() {
  var video = document.getElementById('pres-video');
  var unmuteBtn = document.getElementById('pres-unmute');
  if (!video) return;

  // Tentative d'autoplay avec son (peut être bloqué par le navigateur)
  function tryUnmutedAutoplay() {
    video.muted = false;
    video.volume = 1.0;
    var p = video.play();
    if (p !== undefined) {
      p.catch(function() {
        // Le navigateur a bloqué l'autoplay avec son : on bascule en muet
        video.muted = true;
        video.play().catch(function(){ /* silent */ });
        if (unmuteBtn) unmuteBtn.classList.remove('hidden');
      }).then(function() {
        // Autoplay avec son réussi : bouton inutile
        if (!video.muted && unmuteBtn) unmuteBtn.classList.add('hidden');
      });
    }
  }
  tryUnmutedAutoplay();

  // Bouton "Activer le son" → unmute + replay si nécessaire
  if (unmuteBtn) {
    unmuteBtn.addEventListener('click', function() {
      video.muted = false;
      video.volume = 1.0;
      if (video.paused) video.play().catch(function(){});
      unmuteBtn.classList.add('hidden');
    });
  }

  // Si l'utilisateur unmute via les controls natifs, on cache aussi le bouton
  video.addEventListener('volumechange', function() {
    if (!video.muted && unmuteBtn) unmuteBtn.classList.add('hidden');
  });

  // Redirection à la fin de la vidéo
  var params = new URLSearchParams(window.location.search);
  var profil = params.get('profil');
  var target = (profil === 'societe')
    ? '/installations.html'
    : '/garanties.html#chasseur-individuel';
  video.addEventListener('ended', function() {
    window.location.href = target;
  });
})();
</script>

{{footer}}
</body>
</html>
